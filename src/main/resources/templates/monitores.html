<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CyberShop | Monitores</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>

    <style>
        body { background:#f8f9fa; font-family:'Segoe UI',sans-serif; }
        .product-card { border:1px solid #e9e9e9; background:#fff; border-radius:8px; padding:14px; text-align:center; transition:.18s; height:100%; display:flex; flex-direction:column; }
        .product-card:hover { transform:translateY(-6px); box-shadow:0 8px 20px rgba(0,0,0,0.06); }
        .product-img { height:160px; object-fit:contain; margin-bottom:8px; }
        .product-price { font-weight:700; color:#0a58ca; }
        .stock { color:green; font-size:.95rem; margin-top:6px; }
        .buy-row { margin-top:auto; }
    </style>
</head>
<body>

<nav th:replace="~{layout/plantilla :: header}"></nav>

<div class="container mt-4">
    <h3 class="mb-4">Monitores</h3>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

        <!-- LG 27" -->
        <div class="col">
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/71v5k5n3JIL._AC_SL1500_.jpg" alt="Monitor LG 27" class="img-fluid product-img"/>
                <div>
                    <p><strong>LG</strong><br>27&quot; IPS</p>
                    <p class="product-price">₡120,000</p>
                    <p class="stock">Stock: 7</p>
                </div>

                <div class="buy-row">
                    <form action="/carrito/agregar" method="post" class="d-flex gap-2">
                        <input type="hidden" name="productoId" value="401"/>
                        <input type="number" name="cantidad" min="1" value="1" class="form-control form-control-sm" style="width:85px" />
                        <button class="btn btn-success btn-sm" type="submit"><i class="fas fa-cart-plus"></i> Comprar</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Samsung Curvo 24" -->
        <div class="col">
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/71p5s8p4QnL._AC_SL1500_.jpg" alt="Samsung Curvo 24" class="img-fluid product-img"/>
                <div>
                    <p><strong>Samsung</strong><br>Curvo 24&quot;</p>
                    <p class="product-price">₡99,900</p>
                    <p class="stock">Stock: 11</p>
                </div>

                <div class="buy-row">
                    <form action="/carrito/agregar" method="post" class="d-flex gap-2">
                        <input type="hidden" name="productoId" value="402"/>
                        <input type="number" name="cantidad" min="1" value="1" class="form-control form-control-sm" style="width:85px" />
                        <button class="btn btn-success btn-sm" type="submit"><i class="fas fa-cart-plus"></i> Comprar</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ASUS 144Hz -->
        <div class="col">
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/71y2uKf9yJL._AC_SL1500_.jpg" alt="ASUS 144Hz" class="img-fluid product-img"/>
                <div>
                    <p><strong>ASUS</strong><br>144Hz</p>
                    <p class="product-price">₡165,000</p>
                    <p class="stock">Stock: 6</p>
                </div>

                <div class="buy-row">
                    <form action="/carrito/agregar" method="post" class="d-flex gap-2">
                        <input type="hidden" name="productoId" value="403"/>
                        <input type="number" name="cantidad" min="1" value="1" class="form-control form-control-sm" style="width:85px" />
                        <button class="btn btn-success btn-sm" type="submit"><i class="fas fa-cart-plus"></i> Comprar</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Acer Gaming 27" -->
        <div class="col">
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/71f3mY7D6WL._AC_SL1500_.jpg" alt="Acer Gaming 27" class="img-fluid product-img"/>
                <div>
                    <p><strong>Acer</strong><br>Gaming 27&quot;</p>
                    <p class="product-price">₡189,900</p>
                    <p class="stock">Stock: 4</p>
                </div>

                <div class="buy-row">
                    <form action="/carrito/agregar" method="post" class="d-flex gap-2">
                        <input type="hidden" name="productoId" value="404"/>
                        <input type="number" name="cantidad" min="1" value="1" class="form-control form-control-sm" style="width:85px" />
                        <button class="btn btn-success btn-sm" type="submit"><i class="fas fa-cart-plus"></i> Comprar</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{layout/plantilla :: footer}"></footer>

</body>
</html>
