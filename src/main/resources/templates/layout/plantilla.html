<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity">

<head th:fragment="head">
    <title>CyberShop</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>

    <link rel="icon" type="image/png" sizes="16x16" href="/fav/favicon-16x16.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet"/>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>

    <!-- SCRIPT CARRITO (solo visual) -->
    <script>
        let cartCount = 0;

        function agregarAlCarrito() {
            cartCount++;
            document.getElementById("cartCount").innerText = cartCount;
        }
    </script>
</head>

<body>

<header class="header">
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container">

            <!-- LOGO -->
            <a th:href="@{/}" class="navbar-brand">
                <img th:src="@{/img/logocybershop_96x96.png}" style="width:40px">
                CyberShop
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">

                <!-- MENÚ -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/celulares}">Celulares</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/computadoras}">Computadoras</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/hogar}">Hogar</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/componentes}">Componentes</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/monitores}">Monitores</a></li>
                </ul>

                <!-- BUSCADOR -->
                <form class="d-flex me-3">
                    <input class="form-control me-2" placeholder="Buscar">
                    <button class="btn btn-outline-light">Buscar</button>
                </form>

                <!-- BOTONES DERECHA -->
                <div class="d-flex align-items-center gap-2">

                    <!-- ✅ BOTÓN CARRITO → ENTRA A LA VISTA -->
                    <a class="btn btn-warning position-relative"
                       th:href="@{/carrito}">
                        <i class="fa fa-shopping-cart"></i>
                        <span id="cartCount"
                              class="position-absolute top-0 start-100 translate-middle badge bg-danger">
                            0
                        </span>
                    </a>

                    <!-- RESEÑA -->
                    <a class="btn btn-info text-white"
                       href="mailto:cybershop.soporte@gmail.com">
                        <i class="fa fa-envelope"></i>
                    </a>

                    <!-- LOGIN -->
                    <a class="btn btn-outline-light"
                       th:href="@{/login}" sec:authorize="!isAuthenticated()">
                        <i class="fa fa-sign-in-alt"></i>
                    </a>

                    <!-- REGISTRO -->
                    <a class="btn btn-primary"
                       th:href="@{/registro}" sec:authorize="!isAuthenticated()">
                        <i class="fa fa-user-plus"></i>
                    </a>
                </div>

            </div>
        </div>
    </nav>
</header>

<main class="container my-4">

    <h2>Ofertas por tiempo limitado</h2>

    <!-- PRODUCTO EJEMPLO -->
    <div class="row row-cols-2 row-cols-md-4 g-4">
        <div class="col">
            <div class="card">
                <img src="#" class="card-img-top">
                <div class="card-body">
                    <h6 class="card-title">Producto ejemplo</h6>
                    <p class="fw-bold">₡150,000</p>

                    <!-- ESTE BOTÓN SOLO ES VISUAL -->
                    <button class="btn btn-success w-100"
                            onclick="agregarAlCarrito()">
                        <i class="fa fa-cart-plus"></i> Agregar
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>

<footer class="p-3 bg-secondary text-white text-center mt-4">
    &COPY; CyberShop — Todos los derechos reservados
</footer>

</body>
</html>
