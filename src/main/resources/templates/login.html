<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión | CyberShop</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .login-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
        }

        .form-control {
            padding: 12px;
        }
    </style>
</head>
<body>

<div class="login-card text-center">

    <!-- Logo -->
    <div class="mb-3">
        <i class="bi bi-shield-lock fs-1 text-primary"></i>
        <h5 class="mt-2 fw-bold">CyberShop</h5>
    </div>

    <!-- Título -->
    <h4 class="fw-bold">Iniciar sesión</h4>
    <p class="text-muted mb-4">Accede con tu cuenta</p>

    <!-- Mensaje de error -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Formulario -->
    <form th:action="@{/login}" method="post">

        <!-- Usuario -->
        <div class="mb-3 text-start">
            <label class="form-label">Usuario</label>
            <input type="text"
                   class="form-control"
                   name="correo"
                   placeholder="Nombre de usuario"
                   required>
        </div>

        <!-- Contraseña -->
        <div class="mb-4 text-start">
            <label class="form-label">Contraseña</label>
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Ingresa tu contraseña"
                   required>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>
            Iniciar sesión
        </button>
    </form>

    <!-- Registro -->
    <p class="mt-4 mb-0">
        ¿No tienes cuenta?
        <a th:href="@{/registro}" class="text-primary fw-semibold">Regístrate</a>
    </p>
</div>

</body>
</html>
